<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Composizione</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: #f0f0f0;
      }

      .container {
        width: 300px;
        height: 600px;
        background-color: blue;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 10px;
      }

      .triangle {
        width: 0;
        height: 0;
        border-left: 30px solid transparent;
        border-right: 30px solid transparent;
        border-top: 120px solid red;
      }

      .rectangle {
        width: 250px;
        height: 122px;
        background-color: white;
        display: flex;
        justify-content: center;
        align-items: center;
      }
    </style>
    <base target="_blank" />
  </head>
  <body>
    <div class="container">
      <div class="triangle"></div>
      <div class="rectangle">
        <canvas id="myCanvas" width="250" height="122"></canvas>
      </div>
      <input
        type="number"
        id="currentNumber"
        value="0"
        min="0"
        max="360"
        onchange="updateNumber()"
      />
    </div>
    <script>
      const R = 400;
      const fontSize = 80;
      const topOffset = 10;

      const angleSpace = 360 / 24;

      const canvas = document.getElementById("myCanvas");
      const ctx = canvas.getContext("2d");
      const origin = {
        x: canvas.width / 2,
        y: canvas.height / 2 - R + topOffset,
      };

      function drawText(text, x, y, r = 0) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(r);

        // Testo
        ctx.fillStyle = "black";
        ctx.font = fontSize + "px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(text, 0, 0);

        ctx.restore();
      }

      function angleToCoordinates(angle) {
        const x = origin.x + R * Math.cos((angle * Math.PI) / 180);
        const y = origin.y + R * Math.sin((angle * Math.PI) / 180);
        return { x, y };
      }

      function drawAngledText(text, angle) {
        const { x, y } = angleToCoordinates(angle);
        drawText(text, x, y, (angle * Math.PI) / 180 - Math.PI / 2);
      }

      function drawBackground() {
        // Sfondo bianco
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      function drawTestSquare(x, y) {
        const size = 10;
        ctx.fillStyle = "red";
        ctx.fillRect(x - size / 2, y - size / 2, size, size);
      }

      function updateNumber() {
        drawBackground();
        const number = parseInt(document.getElementById("currentNumber").value);
        const baseAngle = 90;
        drawAngledText(number, baseAngle);

        const previoursNumber = number - 1;
        const nextNumber = number + 1;
        drawAngledText(previoursNumber, baseAngle - angleSpace);
        drawAngledText(nextNumber, baseAngle + angleSpace);
      }
      updateNumber();
    </script>
  </body>
</html>
