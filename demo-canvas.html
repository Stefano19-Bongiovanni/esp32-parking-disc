<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Composizione</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: #f0f0f0;
      }

      .container {
        width: 300px;
        height: 600px;
        background-color: blue;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 10px;
      }

      .triangle {
        width: 0;
        height: 0;
        border-left: 30px solid transparent;
        border-right: 30px solid transparent;
        border-top: 120px solid red;
      }

      .rectangle {
        width: 250px;
        height: 122px;
        background-color: white;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      #numberDisplay {
        color: white;
        font-family: Arial, sans-serif;
        font-size: 24px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="triangle"></div>
      <div class="rectangle">
        <canvas id="myCanvas" width="250" height="122"></canvas>
      </div>
      <input
        type="range"
        id="currentNumber"
        value="0"
        min="0"
        max="23.75"
        step="0.25"
        oninput="updateNumber()"
      />
      <div id="numberDisplay">0</div>
    </div>

    <script>
      const R = 400;
      const fontSize = 80;
      const topOffset = 10;
      const angleSpace = 360 / 24;

      const canvas = document.getElementById("myCanvas");
      const ctx = canvas.getContext("2d");
      const display = document.getElementById("numberDisplay");

      const origin = {
        x: canvas.width / 2,
        y: canvas.height / 2 - R + topOffset,
      };

      // Funzione per gestire il modulo ciclico (0-23)
      function wrap(n) {
        return ((n % 24) + 24) % 24;
      }

      function drawText(text, x, y, r = 0) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(r);
        ctx.fillStyle = "black";
        ctx.font = fontSize + "px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(text, 0, 0);
        ctx.restore();
      }

      function angleToCoordinates(angle) {
        const x = origin.x + R * Math.cos((angle * Math.PI) / 180);
        const y = origin.y + R * Math.sin((angle * Math.PI) / 180);
        return { x, y };
      }

      function drawAngledText(text, angle) {
        const { x, y } = angleToCoordinates(angle);
        drawText(text, x, y, (angle * Math.PI) / 180 - Math.PI / 2);
      }

      function drawBackground() {
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      function getIntAndShift(number) {
        const value = Math.round(number);
        const decimal = number - value;
        const shift = decimal * angleSpace;
        return { value, shift };
      }

      function updateNumber() {
        drawBackground();
        const inputVal = parseFloat(
          document.getElementById("currentNumber").value,
        );

        // Aggiorna il testo sotto lo slider
        display.innerText = inputVal.toFixed(2);

        const { value, shift } = getIntAndShift(inputVal);
        let baseAngle = 90 + shift;

        // Numero centrale (con wrap)
        drawAngledText(wrap(value), baseAngle);

        // Numero precedente e successivo con logica circolare
        drawAngledText(wrap(value + 1), baseAngle - angleSpace);
        drawAngledText(wrap(value - 1), baseAngle + angleSpace);
      }

      updateNumber();
    </script>
  </body>
</html>
